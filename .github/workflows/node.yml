name: node CI

on:
  push:
    paths:
      - 'node/**'
      - '.github/workflows/node.yml'
  pull_request:
    paths:
      - 'node/**'
      - '.github/workflows/node.yml'

defaults:
  run:
    working-directory: node

jobs:
  build:
    name: Build, lint & test — Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: ['18.x', '20.x', '22.x']
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size

      - name: Test
        run: npm test
